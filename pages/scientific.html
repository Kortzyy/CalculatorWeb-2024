<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator — Scientific</title>

    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/calculator.css">

    <style>
        .calculator {
            width: 440px;
        }

        /* 
            Layout: 5 columns
            col 1-2: sci functions (2 wide)
            col 3-5: numbers + operators (3 wide, standard layout)
        */
        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            gap: 8px;
        }

        button {
            height: 48px;
            font-size: 1rem;
        }

        /* Scientific function buttons — left 2 cols */
        .sci {
            background: #1e1e1e;
            color: var(--accent);
            font-size: 0.82rem;
            font-weight: bold;
        }

        .sci:hover {
            background: #2a2a2a;
        }

        #degRadBtn {
            background: #1e1e1e;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: bold;
            letter-spacing: 0.04em;
        }

        #degRadBtn:hover {
            background: #2a2a2a;
            color: var(--text);
        }

        /* Divider line between sci and number sections */
        .divider {
            grid-column: span 5;
            height: 1px;
            background: #2a2a2a;
            margin: 2px 0;
        }
    </style>
</head>

<body>

<div class="wrapper">

    <nav class="side-menu" id="menu">
        <div class="menu-grid">
            <a href="../index.html"    class="menu-item"><div class="icon">⌨</div><span>Standard</span></a>
            <a href="scientific.html"  class="menu-item"><div class="icon">∑</div><span>Scientific</span></a>
            <a href="programmer.html"  class="menu-item"><div class="icon">&lt;/&gt;</div><span>Programmer</span></a>
            <a href="currency.html"    class="menu-item"><div class="icon">Ⓒ</div><span>Currency</span></a>
            <a href="temperature.html" class="menu-item"><div class="icon">℃</div><span>Temperature</span></a>
            <a href="bmi.html"         class="menu-item"><div class="icon">⚖</div><span>BMI</span></a>
            <a href="speed.html"       class="menu-item"><div class="icon">➤</div><span>Speed</span></a>
            <a href="time.html"        class="menu-item"><div class="icon">⏱</div><span>Time</span></a>
        </div>
    </nav>

    <main class="calculator">

        <div class="burger" onclick="toggleMenu()">
            <div></div><div></div><div></div>
        </div>

        <div class="display">
            <div class="top-bar">
                <div></div>
                <div class="history-toggle" onclick="toggleHistory()">History</div>
            </div>
            <div class="operation" id="operation"></div>
            <div class="result" id="result">0</div>
        </div>

        <div class="buttons">

            <!--
                5-column grid:
                [sci] [sci] [num] [num] [op]
            -->

            <!-- Row 1 -->
            <button id="degRadBtn" class="sci">DEG</button>
            <button class="sci" data-fn="pi">π</button>
            <button class="clear" data-action="clear">C</button>
            <button data-action="delete">⌫</button>
            <button class="operator" data-op="%">%</button>

            <!-- Row 2 -->
            <button class="sci" data-fn="sq">x²</button>
            <button class="sci" onclick="addPowerOp()">xʸ</button>
            <button data-num="7">7</button>
            <button data-num="8">8</button>
            <button data-num="9">9</button>

            <!-- Row 3 -->
            <button class="sci" data-fn="sqrt">√</button>
            <button class="sci" data-fn="inv">1/x</button>
            <button data-num="4">4</button>
            <button data-num="5">5</button>
            <button data-num="6">6</button>

            <!-- Row 4 -->
            <button class="sci" data-fn="log">log</button>
            <button class="sci" data-fn="ln">ln</button>
            <button data-num="1">1</button>
            <button data-num="2">2</button>
            <button data-num="3">3</button>

            <!-- Row 5 -->
            <button class="sci" data-fn="sin">sin</button>
            <button class="sci" data-fn="cos">cos</button>
            <button data-num="0" style="grid-column: span 2;">0</button>
            <button data-num=".">.</button>

            <!-- Row 6 -->
            <button class="sci" data-fn="tan">tan</button>
            <button class="sci" data-fn="e">e</button>
            <button class="operator" data-op="/">÷</button>
            <button class="operator" data-op="*">×</button>
            <button class="operator" data-op="-">−</button>

            <!-- Row 7 -->
            <button class="sci" data-fn="fact">n!</button>
            <button class="sci" data-fn="sign">±</button>
            <button class="operator" data-op="+">+</button>
            <button class="equal" data-action="equal" style="grid-column: span 2;">=</button>

        </div>
    </main>

    <aside class="history-panel" id="historyPanel">
        <h3>History</h3>
        <ul id="historyList"></ul>
        <button id="clearHistoryBtn">Clear History</button>
    </aside>

</div>

<script src="../assets/js/menu.js"></script>
<script src="../assets/js/history.js"></script>
<script src="../assets/js/scientific.js"></script>

</body>
</html>
