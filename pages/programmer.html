<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator — Programmer</title>

    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/calculator.css">

    <style>
        .calculator {
            width: 420px;
        }

        /* Base displays under the result */
        .base-displays {
            margin: 8px 0 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .base-displays span {
            font-size: 0.78rem;
            color: var(--muted);
            text-align: right;
            font-family: monospace;
            letter-spacing: 0.03em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .base-displays span.active-base {
            color: var(--accent);
        }

        /* Base selector buttons */
        .base-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .base-btn {
            height: 36px;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 10px;
            border: 2px solid transparent;
            background: #1e1e1e;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }

        .base-btn:hover {
            background: #2a2a2a;
            color: var(--text);
        }

        .base-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: #1a2e25;
        }

        /* Button grid — 5 columns */
        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        button {
            height: 48px;
            font-size: 1rem;
        }

        /* Bitwise op buttons */
        .bitwise {
            background: #1e1e1e;
            color: #7eb8f7;
            font-size: 0.82rem;
            font-weight: bold;
        }

        .bitwise:hover {
            background: #2a2a2a;
        }

        /* HEX letter buttons A-F */
        .hex-btn {
            background: #1e1e1e;
            color: var(--text);
            font-weight: bold;
        }

        .hex-btn:hover {
            background: #2a2a2a;
        }

        .hex-btn:disabled,
        button:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

<div class="wrapper">

    <nav class="side-menu" id="menu">
        <div class="menu-grid">
            <a href="../index.html"    class="menu-item"><div class="icon">⌨</div><span>Standard</span></a>
            <a href="scientific.html"  class="menu-item"><div class="icon">∑</div><span>Scientific</span></a>
            <a href="programmer.html"  class="menu-item"><div class="icon">&lt;/&gt;</div><span>Programmer</span></a>
            <a href="currency.html"    class="menu-item"><div class="icon">Ⓒ</div><span>Currency</span></a>
            <a href="temperature.html" class="menu-item"><div class="icon">℃</div><span>Temperature</span></a>
            <a href="bmi.html"         class="menu-item"><div class="icon">⚖</div><span>BMI</span></a>
            <a href="speed.html"       class="menu-item"><div class="icon">➤</div><span>Speed</span></a>
            <a href="time.html"        class="menu-item"><div class="icon">⏱</div><span>Time</span></a>
        </div>
    </nav>

    <main class="calculator">

        <div class="burger" onclick="toggleMenu()">
            <div></div><div></div><div></div>
        </div>

        <!-- Display -->
        <div class="display">
            <div class="top-bar">
                <div></div>
                <div class="history-toggle" onclick="toggleHistory()">History</div>
            </div>
            <div class="operation" id="operation"></div>
            <div class="result" id="result">0</div>
        </div>

        <!-- Base readouts -->
        <div class="base-displays">
            <span id="hexDisplay">HEX  0</span>
            <span id="decDisplay" class="active-base">DEC  0</span>
            <span id="octDisplay">OCT  0</span>
            <span id="binDisplay">BIN  0</span>
        </div>

        <!-- Base selector -->
        <div class="base-selector">
            <button class="base-btn" data-base="HEX">HEX</button>
            <button class="base-btn active" data-base="DEC">DEC</button>
            <button class="base-btn" data-base="OCT">OCT</button>
            <button class="base-btn" data-base="BIN">BIN</button>
        </div>

        <!-- Button grid -->
        <div class="buttons">

            <!-- Row 1: Bitwise ops -->
            <button class="bitwise" data-op="&">AND</button>
            <button class="bitwise" data-op="|">OR</button>
            <button class="bitwise" data-op="^">XOR</button>
            <button class="bitwise" data-action="not">NOT</button>
            <button class="bitwise" data-op="<<">«</button>

            <!-- Row 2: Hex A-F + shift right -->
            <button class="hex-btn" data-num="A">A</button>
            <button class="hex-btn" data-num="B">B</button>
            <button class="hex-btn" data-num="C">C</button>
            <button class="hex-btn" data-num="D">D</button>
            <button class="bitwise" data-op=">>">»</button>

            <!-- Row 3: Hex E F + clear/delete/divide -->
            <button class="hex-btn" data-num="E">E</button>
            <button class="hex-btn" data-num="F">F</button>
            <button class="clear"   data-action="clear">C</button>
            <button data-action="delete">⌫</button>
            <button class="operator" data-op="/">÷</button>

            <!-- Row 4: 7 8 9 × -->
            <button data-num="7">7</button>
            <button data-num="8">8</button>
            <button data-num="9">9</button>
            <button class="operator" data-op="*">×</button>
            <button class="operator" data-op="-">−</button>

            <!-- Row 5: 4 5 6 -->
            <button data-num="4">4</button>
            <button data-num="5">5</button>
            <button data-num="6">6</button>
            <button class="operator" data-op="+">+</button>
            <button class="equal" data-action="equal" style="grid-row: span 2;">=</button>

            <!-- Row 6: 1 2 3 -->
            <button data-num="1">1</button>
            <button data-num="2">2</button>
            <button data-num="3">3</button>
            <button class="operator" data-op="%">%</button>

            <!-- Row 7: 0 . -->
            <button data-num="0" style="grid-column: span 3;">0</button>
            <button data-num=".">.</button>

        </div>
    </main>

    <aside class="history-panel" id="historyPanel">
        <h3>History</h3>
        <ul id="historyList"></ul>
        <button id="clearHistoryBtn">Clear History</button>
    </aside>

</div>

<script src="../assets/js/menu.js"></script>
<script src="../assets/js/history.js"></script>
<script src="../assets/js/programmer.js"></script>

</body>
</html>
