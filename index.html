<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator — Standard</title>

    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/calculator.css">
</head>

<body>

<div class="wrapper">

    <!-- ── Side Navigation Menu ── -->
    <nav class="side-menu" id="menu" aria-label="Calculator modes">
        <div class="menu-grid">
            <a href="index.html"              class="menu-item"><div class="icon">⌨</div><span>Standard</span></a>
            <a href="pages/scientific.html"  class="menu-item"><div class="icon">∑</div><span>Scientific</span></a>
            <a href="pages/programmer.html"  class="menu-item"><div class="icon">&lt;/&gt;</div><span>Programmer</span></a>
            <a href="pages/currency.html"    class="menu-item"><div class="icon">Ⓒ</div><span>Currency</span></a>
            <a href="pages/temperature.html" class="menu-item"><div class="icon">℃</div><span>Temperature</span></a>
            <a href="pages/bmi.html"         class="menu-item"><div class="icon">⚖</div><span>BMI</span></a>
            <a href="pages/speed.html"       class="menu-item"><div class="icon">➤</div><span>Speed</span></a>
            <a href="pages/time.html"        class="menu-item"><div class="icon">⏱</div><span>Time</span></a>
        </div>
    </nav>

    <!-- ── Calculator ── -->
    <main class="calculator" aria-label="Standard calculator">

        <!-- Burger Menu Button -->
        <div class="burger" onclick="toggleMenu()">
            <div></div>
            <div></div>
            <div></div>
        </div>

        <!-- Display -->
        <div class="display">
            <div class="top-bar">
                <div><!-- burger placeholder --></div>
                <div class="history-toggle" onclick="toggleHistory()">History</div>
            </div>
            <div class="operation" id="operation" aria-live="polite"></div>
            <div class="result"    id="result"    aria-live="polite">0</div>
        </div>

        <!-- Button Pad -->
        <div class="buttons" role="group" aria-label="Calculator buttons">
            <button class="clear"    data-action="clear"  aria-label="Clear">C</button>
            <button class="operator" data-op="%"          aria-label="Percent">%</button>
            <button                  data-action="delete" aria-label="Delete">⌫</button>
            <button class="operator" data-op="/"          aria-label="Divide">/</button>

            <button data-num="7">7</button>
            <button data-num="8">8</button>
            <button data-num="9">9</button>
            <button class="operator" data-op="*" aria-label="Multiply">×</button>

            <button data-num="4">4</button>
            <button data-num="5">5</button>
            <button data-num="6">6</button>
            <button class="operator" data-op="-" aria-label="Subtract">−</button>

            <button data-num="1">1</button>
            <button data-num="2">2</button>
            <button data-num="3">3</button>
            <button class="operator" data-op="+" aria-label="Add">+</button>

            <button data-num="0"  style="grid-column: span 2;">0</button>
            <button data-num=".">.</button>
            <button class="equal" data-action="equal" aria-label="Equals">=</button>
        </div>

    </main>

    <!-- ── History Panel ── -->
    <aside class="history-panel" id="historyPanel" aria-label="Calculation history">
        <h3>History</h3>
        <ul id="historyList" aria-live="polite"></ul>
        <button id="clearHistoryBtn">Clear History</button>
    </aside>

</div>

<!-- Scripts -->
<script src="assets/js/menu.js"></script>
<script src="assets/js/history.js"></script>
<script src="assets/js/calculator.js"></script>

</body>
</html>
